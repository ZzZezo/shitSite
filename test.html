<!DOCTYPE html>
<html>
<head>
    <title>TEST</title>
</head>
<style>
        @font-face {
        font-family: 'Old Sans Serif';
        src: url('../assets/font/ms-sans-serif.woff') format('woff');
    }

    body,html {
        background-color: teal;
        font-family: 'Old Sans Serif';
        cursor: url('../assets/images/old_pointer.png'), auto;
    }
</style>
<body style="text-align: center;">
    <button onclick='readBruno("holyjump_highscore")'>Get Jump highscore</button>
    <button onclick='readBruno("holyjump_flohighscore")'>Get Jump flohighscore</button>
    <button onclick='readBruno("luckgame")'>Get luckgame</button>
</body>

<script>
    //create iframe and load bruno page inside
    const targetOrigin = "https://nichtbruno.de";
    let iframe = document.createElement('iframe');
    iframe.src = targetOrigin + "/api/handshake.html";
    iframe.style.display = "none"; 
    document.body.appendChild(iframe);

    //listener to listen to what bruno says
    window.addEventListener("message", (event) => {
        if (event.origin !== targetOrigin) return;
        alert(event.data);
    });

    function readBruno(category) {
        iframe.contentWindow.postMessage(category, targetOrigin);
    }
</script>

</html>
